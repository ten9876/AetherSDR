name: macOS DMG

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dmg:
    strategy:
      matrix:
        include:
          - runner: macos-15
            label: apple-silicon
          - runner: macos-15-intel
            label: intel
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies via Homebrew
        run: |
          brew install ninja create-dmg autoconf automake libtool \
            fftw portaudio hidapi
          if [ "${{ matrix.label }}" = "apple-silicon" ]; then
            # Apple Silicon: Homebrew Qt targets current OS, fine for arm64
            brew install qt@6 qtkeychain
          else
            # Intel: don't install Homebrew Qt — we build from source below.
            # qtkeychain pulls in qt@6 as a dependency, so skip it too and
            # build without SmartLink credential persistence on Intel.
            brew install fftw portaudio hidapi
          fi

      - name: Restore Qt cache (Intel only)
        if: matrix.label == 'intel'
        id: qt-cache
        uses: actions/cache@v4
        with:
          path: qt-install
          key: qt-6.7.3-macos-intel-deploy13

      - name: Build Qt from source (Intel only, cache miss)
        if: matrix.label == 'intel' && steps.qt-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v6.7.3 https://code.qt.io/qt/qt5.git qt-src
          cd qt-src
          perl init-repository --module-subset=qtbase,qtmultimedia,qtwebsockets,qtserialport,qtshadertools
          cd ..
          mkdir qt-build && cd qt-build
          ../qt-src/configure -prefix $PWD/../qt-install \
            -release -opensource -confirm-license \
            -nomake examples -nomake tests \
            QMAKE_MACOSX_DEPLOYMENT_TARGET=13.0 \
            -- -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0
          cmake --build . --parallel $(sysctl -n hw.ncpu)
          cmake --install .

      - name: Generate .icns from PNG
        run: |
          mkdir -p AetherSDR.iconset
          sips -z 16 16     docs/logo-circle.png --out AetherSDR.iconset/icon_16x16.png
          sips -z 32 32     docs/logo-circle.png --out AetherSDR.iconset/icon_16x16@2x.png
          sips -z 32 32     docs/logo-circle.png --out AetherSDR.iconset/icon_32x32.png
          sips -z 64 64     docs/logo-circle.png --out AetherSDR.iconset/icon_32x32@2x.png
          sips -z 128 128   docs/logo-circle.png --out AetherSDR.iconset/icon_128x128.png
          sips -z 256 256   docs/logo-circle.png --out AetherSDR.iconset/icon_128x128@2x.png
          sips -z 256 256   docs/logo-circle.png --out AetherSDR.iconset/icon_256x256.png
          sips -z 512 512   docs/logo-circle.png --out AetherSDR.iconset/icon_256x256@2x.png
          sips -z 512 512   docs/logo-circle.png --out AetherSDR.iconset/icon_512x512.png
          sips -z 768 768   docs/logo-circle.png --out AetherSDR.iconset/icon_512x512@2x.png
          iconutil -c icns AetherSDR.iconset -o docs/AetherSDR.icns

      - name: Configure
        run: |
          if [ "${{ matrix.label }}" = "intel" ]; then
            QT_PREFIX="$PWD/qt-install"
            DEPLOY_TARGET="13.0"
          else
            QT_PREFIX="$(brew --prefix)"
            DEPLOY_TARGET="14.0"
          fi
          cmake -B build -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="$DEPLOY_TARGET" \
            -DCMAKE_PREFIX_PATH="$QT_PREFIX;$(brew --prefix)"

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Verify binary
        run: |
          echo "=== Architecture check ==="
          file build/AetherSDR.app/Contents/MacOS/AetherSDR
          lipo -info build/AetherSDR.app/Contents/MacOS/AetherSDR

      - name: Bundle Qt frameworks
        run: |
          if [ "${{ matrix.label }}" = "intel" ]; then
            DEPLOYQT="$PWD/qt-install/bin/macdeployqt"
          else
            DEPLOYQT="$(brew --prefix qt@6)/bin/macdeployqt"
          fi
          "$DEPLOYQT" build/AetherSDR.app \
            -verbose=1 \
            -always-overwrite

      - name: Import code signing certificate
        env:
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          echo "$APPLE_CERT_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings build.keychain
          security import cert.p12 -k build.keychain -P "$APPLE_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm cert.p12

      - name: Code sign application
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          find build/AetherSDR.app -name "*.dylib" -o -name "*.framework" -type d | while read item; do
            codesign --force --options runtime --timestamp \
              --sign "Developer ID Application" "$item" 2>/dev/null || true
          done
          codesign --force --deep --options runtime --timestamp \
            --entitlements macos/AetherSDR.entitlements \
            --sign "Developer ID Application" \
            build/AetherSDR.app
          codesign --verify --deep --strict build/AetherSDR.app
          echo "Code signing verified successfully"

      - name: Create DMG
        run: |
          create-dmg \
            --volname "AetherSDR" \
            --volicon "docs/AetherSDR.icns" \
            --background "docs/logo-invert.png" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "AetherSDR.app" 150 110 \
            --hide-extension "AetherSDR.app" \
            --app-drop-link 450 110 \
            "AetherSDR-${{ github.ref_name }}-macOS-${{ matrix.label }}.dmg" \
            "build/AetherSDR.app" \
          || true

      - name: Sign DMG
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          codesign --force --timestamp \
            --sign "Developer ID Application" \
            AetherSDR-${{ github.ref_name }}-macOS-${{ matrix.label }}.dmg

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit \
            AetherSDR-${{ github.ref_name }}-macOS-${{ matrix.label }}.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 600
          xcrun stapler staple \
            AetherSDR-${{ github.ref_name }}-macOS-${{ matrix.label }}.dmg
          echo "Notarization and stapling complete"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: macOS-DMG-${{ matrix.label }}
          path: AetherSDR-*.dmg

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: AetherSDR-*.dmg

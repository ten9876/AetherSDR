name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/ten9876/aethersdr-ci:latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup DeepFilterNet3 (DFNR)
        run: bash setup-deepfilter.sh

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Pre-cache Opus neural net model
        run: |
          # Copy cached model from Docker image so Opus autogen.sh skips
          # the media.xiph.org download. Falls back to network if not cached.
          MODEL="opus_data-4ed9445b96698bad25d852e912b41495ddfa30c8dbc8a55f9cde5826ed793453.tar.gz"
          OPUS_SRC=$(find build -path "*/build_opus-prefix/src/build_opus" -type d 2>/dev/null | head -1)
          if [ -f "/opt/opus-model/$MODEL" ] && [ -n "$OPUS_SRC" ]; then
            cp "/opt/opus-model/$MODEL" "$OPUS_SRC/"
            echo "Copied cached Opus model to $OPUS_SRC"
          else
            echo "No cached model or Opus source not yet extracted — will download during build"
          fi

      - name: Build
        run: cmake --build build -j$(nproc)

  # Detect if build system or third-party deps changed
  check-paths:
    runs-on: ubuntu-latest
    outputs:
      build-changed: ${{ steps.filter.outputs.build }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            build:
              - 'CMakeLists.txt'
              - 'third_party/**'
              - '.github/workflows/**'

  # Cross-platform build check — runs only when CMakeLists.txt, third_party/,
  # or workflows are modified, to catch MSVC issues before release. (#796 lesson)
  check-windows:
    needs: [build, check-paths]
    if: needs.check-paths.outputs.build-changed == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          modules: 'qtmultimedia qtwebsockets qtserialport qtshadertools'

      - name: Install FFTW3
        shell: pwsh
        run: |
          if (Test-Path scripts/setup-fftw.ps1) { ./scripts/setup-fftw.ps1 }
          elseif (Test-Path setup-fftw.ps1) { ./setup-fftw.ps1 }
          else { Write-Host "No FFTW setup script — skipping" }

      - name: Setup DeepFilterNet3 (DFNR)
        shell: pwsh
        run: .\setup-deepfilter.ps1

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DENABLE_RADE=OFF

      - name: Build
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

name: Release

# Bump version, update changelog header, create PR, merge, tag.
# Triggered manually via GitHub Actions UI or `git release <version>` alias.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.7.13)'
        required: true
      notes:
        description: 'One-line release summary (optional)'
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qP '^\d+\.\d+\.\d+$'; then
            echo "::error::Version must be in X.Y.Z format (e.g. 0.7.13)"
            exit 1
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version in CMakeLists.txt
        run: |
          sed -i "s/project(AetherSDR VERSION [0-9.]*\b/project(AetherSDR VERSION ${{ inputs.version }}/" CMakeLists.txt

      - name: Bump version in README.md
        run: |
          sed -i "s/\*\*Current version: [0-9.]*\*\*/\*\*Current version: ${{ inputs.version }}\*\*/" README.md

      - name: Bump version in CLAUDE.md
        run: |
          sed -i "s/Current version: \*\*[0-9.]*\*\*/Current version: \*\*${{ inputs.version }}\*\*/" CLAUDE.md

      - name: Update CHANGELOG.md date
        run: |
          DATE=$(date +%Y-%m-%d)
          # If there's already an entry for this version, update its date
          if grep -q "\[v${{ inputs.version }}\]" CHANGELOG.md; then
            sed -i "s/\[v${{ inputs.version }}\] — .*/[v${{ inputs.version }}] — $DATE/" CHANGELOG.md
          else
            # Insert a new entry after the first line that starts with "## ["
            sed -i "/^## \[v/i ## [v${{ inputs.version }}] — $DATE\n" CHANGELOG.md
          fi

      - name: Create release branch and commit
        run: |
          BRANCH="release/v${{ inputs.version }}"
          git checkout -b "$BRANCH"
          git add CMakeLists.txt README.md CLAUDE.md CHANGELOG.md
          git commit -m "Bump version to ${{ inputs.version }}"
          git push -u origin "$BRANCH"

      - name: Create PR and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES="${{ inputs.notes }}"
          BODY="## Release v${{ inputs.version }}"
          if [ -n "$NOTES" ]; then
            BODY="$BODY\n\n$NOTES"
          fi
          BODY="$BODY\n\nAuto-generated by the release workflow."

          gh pr create \
            --title "Release v${{ inputs.version }}" \
            --body "$(echo -e "$BODY")" \
            --head "release/v${{ inputs.version }}" \
            --base main

          gh pr merge --auto --squash "release/v${{ inputs.version }}"

      - name: Wait for PR to merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting for PR to merge..."
          for i in $(seq 1 60); do
            STATE=$(gh pr view "release/v${{ inputs.version }}" --json state -q .state)
            if [ "$STATE" = "MERGED" ]; then
              echo "PR merged!"
              break
            fi
            echo "  Attempt $i: state=$STATE, waiting 10s..."
            sleep 10
          done
          if [ "$STATE" != "MERGED" ]; then
            echo "::error::PR did not merge within 10 minutes"
            exit 1
          fi

      - name: Tag release
        run: |
          git fetch origin main
          git checkout main
          git pull origin main
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"
          echo "🏷️ Tagged v${{ inputs.version }} — build workflows triggered"

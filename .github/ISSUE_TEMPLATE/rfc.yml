name: RFC (Request for Comments)
description: Propose a significant change requiring maintainer approval before implementation
labels: [rfc]
body:
  - type: markdown
    attributes:
      value: |
        ## Before you write any code

        Some changes require an approved RFC before a PR will be accepted.
        See [GOVERNANCE.md](https://github.com/aethersdr/AetherSDR/blob/main/GOVERNANCE.md#rfc-process)
        for the full list, which includes:

        - Visual design changes (colors, fonts, layout, theme)
        - UX behavior changes (what clicks, shortcuts, or gestures do by default)
        - New external dependencies
        - Architecture changes (threading, signal routing, audio pipeline)
        - Platform-specific native integration that touches shared code
        - New feature areas substantially beyond current scope

        **Do not open a PR until this RFC is approved.** PRs that skip the RFC
        process for required changes will be closed with a link back here.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: "I have read [GOVERNANCE.md](https://github.com/aethersdr/AetherSDR/blob/main/GOVERNANCE.md) and confirmed this change requires an RFC"
          required: true
        - label: "I have searched existing issues and this RFC has not been proposed before"
          required: true
        - label: "I have not opened a PR for this change yet"
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is broken, missing, or frustrating? Why does it matter?
      placeholder: |
        Describe the problem you are trying to solve — not the solution.
        Reference SmartSDR behavior or user reports where applicable.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What do you want to change and how?
      placeholder: |
        Describe your proposed change clearly enough that someone else could implement it.
        Include mockups, diagrams, or SmartSDR screenshots if relevant.
    validations:
      required: true

  - type: textarea
    id: crossplatform
    attributes:
      label: Cross-platform impact
      description: How does this affect Linux, macOS, and Windows? AetherSDR is Linux-native first.
      placeholder: |
        Linux: ...
        macOS: ...
        Windows: ...

        If the change is platform-specific, explain why it cannot be implemented
        cross-platform and what the plan is for the other platforms.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you look at? Why is your proposal the right approach?
    validations:
      required: false

  - type: textarea
    id: scope
    attributes:
      label: Implementation scope
      description: Which files and subsystems would this touch? Any known risks?
      placeholder: |
        Files affected: src/gui/..., src/core/...
        New dependencies: none / libfoo
        Known risks: ...
    validations:
      required: false
